apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: configure-filebrowser-auth
          image: filebrowser/filebrowser
          command:
            - sh
            - -c
            - >
              filebrowser config set
              -d /database/filebrowser.db
              --auth.method=proxy
              --auth.header=X-Forwarded-Preferred-Username
          volumeMounts:
            - name: data
              mountPath: /database
              subPath: database
            - name: data
              mountPath: /config
              subPath: config
        
        - name: ensure-proxy-user
          image: filebrowser/filebrowser
          command:
            - sh
            - -c
            - >
              filebrowser users find nipo-test -d /database/filebrowser.db ||
              filebrowser users add nipo-test temp-pass-123 -d /database/filebrowser.db;
              filebrowser users update nipo-test --lockPassword --perm.admin -d /database/filebrowser.db
          volumeMounts:
            - name: data
              mountPath: /database
              subPath: database
            - name: data
              mountPath: /config
              subPath: config

      containers:
        - name: filebrowser
          image: filebrowser/filebrowser
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /srv
              subPath: srv
            - name: data
              mountPath: /database
              subPath: database
            - name: data
              mountPath: /config
              subPath: config
          
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: filebrowser-pvc