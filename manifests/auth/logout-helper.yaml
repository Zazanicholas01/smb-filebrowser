apiVersion: v1
kind: ConfigMap
metadata:
  name: logout-helper-content
  namespace: auth
data:
  logout.html: |
    <!doctype html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>Signing out</title>
    </head>
    <body>
      <p>Signing out...</p>
      <script>
        const keycloakLogout =
          "https://keycloak.home.nipo/realms/home/protocol/openid-connect/logout" +
          "?id_token_hint={id_token}" +
          "&client_id=filebrowser" +
          "&post_logout_redirect_uri=https%3A%2F%2Ffiles.home.nipo%2Flogged-out";

        const target =
          "/oauth2/sign_out?rd=" + encodeURIComponent(keycloakLogout);

        window.location.replace(target);
      </script>
    </body>
    </html>
  logged-out.html: |
    <!doctype html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>Logged out</title>
    </head>
    <body>
      <h1>Logged out</h1>
      <p>Your File Browser and Keycloak sessions have been ended.</p>
      <p><a href="/">Sign in again</a></p>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logout-helper-nginx
  namespace: auth
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index logout.html;

      location = /logout {
        try_files /logout.html =404;
      }

      location = /logged-out {
        try_files /logged-out.html =404;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logout-helper
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logout-helper
  template:
    metadata:
      labels:
        app: logout-helper
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: html-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: nginx-config
          configMap:
            name: logout-helper-nginx
        - name: html-content
          configMap:
            name: logout-helper-content
---
apiVersion: v1
kind: Service
metadata:
  name: logout-helper
  namespace: auth
spec:
  selector:
    app: logout-helper
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-filebrowser-route-to-logout-helper
  namespace: auth
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: filebrowser
  to:
    - group: ""
      kind: Service
      name: logout-helper
