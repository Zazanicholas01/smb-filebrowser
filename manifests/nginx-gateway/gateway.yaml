apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: filebrowser-gateway
  namespace: filebrowser
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: files.home.nipo
      allowedRoutes:
        namespaces:
          from: Same
    
    - name: https
      protocol: HTTPS
      port: 443
      hostname: files.home.nipo
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: filebrowser-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser-route
  namespace: filebrowser
spec:
  parentRefs:
    - name: filebrowser-gateway
      sectionName: https
  hostnames:
    - files.home.nipo
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: filebrowser
          port: 80